{% extends "base.html" %}
{% block title %}My Profile{% endblock %}

{% block content %}
<section class="dashboard-header py-4 bg-light">
    <div class="container">
        <h1 class="fw-bold">My Profile</h1>
    </div>
</section>

<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-5">
                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Full Name</label>
                                <input type="text" class="form-control form-control-lg" name="full_name" value="{{ user.full_name }}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email" class="form-control form-control-lg" value="{{ user.email }}" disabled>
                                <div class="form-text">Email cannot be changed.</div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Phone</label>
                                <input type="tel" class="form-control form-control-lg" name="phone" value="{{ user.phone or '' }}">
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg">Save Changes</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
