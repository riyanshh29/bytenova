{% extends "base.html" %}
{% block title %}{% if job %}Edit Job{% else %}Post New Job{% endif %}{% endblock %}

{% block content %}
<section class="dashboard-header py-4 bg-light">
    <div class="container">
        <h1 class="fw-bold">{% if job %}Edit Job{% else %}Post New Job{% endif %}</h1>
    </div>
</section>

<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-5">
                        <form method="POST">
                            <div class="row g-3">
                                <div class="col-md-8">
                                    <label class="form-label fw-semibold">Job Title *</label>
                                    <input type="text" class="form-control" name="title" value="{{ job.title if job else '' }}" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">Department *</label>
                                    <input type="text" class="form-control" name="department" value="{{ job.department if job else '' }}" required placeholder="e.g. Engineering">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Location *</label>
                                    <input type="text" class="form-control" name="location" value="{{ job.location if job else '' }}" required placeholder="e.g. Indore, Madhya Pradesh (Hybrid)">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Job Type *</label>
                                    <select class="form-select" name="job_type" required>
                                        {% set types = ['Full-time', 'Part-time', 'Contract', 'Internship', 'Remote'] %}
                                        {% for t in types %}
                                        <option value="{{ t }}" {% if job and job.job_type == t %}selected{% endif %}>{{ t }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-semibold">Salary Range</label>
                                    <input type="text" class="form-control" name="salary_range" value="{{ job.salary_range if job else '' }}" placeholder="e.g. ₹7 LPA – ₹11 LPA">
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-semibold">Description *</label>
                                    <textarea class="form-control" name="description" rows="5" required>{{ job.description if job else '' }}</textarea>
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-semibold">Requirements *</label>
                                    <textarea class="form-control" name="requirements" rows="5" required placeholder="One requirement per line">{{ job.requirements if job else '' }}</textarea>
                                </div>
                                {% if job %}
                                <div class="col-12">
                                    <div class="form-check">
                                        <input type="checkbox" class="form-check-input" name="is_active" id="is_active" {% if job.is_active %}checked{% endif %}>
                                        <label class="form-check-label" for="is_active">Job listing is active</label>
                                    </div>
                                </div>
                                {% endif %}
                            </div>
                            <div class="mt-4 d-flex gap-3">
                                <button type="submit" class="btn btn-primary btn-lg">{% if job %}Save Changes{% else %}Post Job{% endif %}</button>
                                <a href="{{ url_for('recruiter.dashboard') }}" class="btn btn-outline-secondary btn-lg">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
